<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Ship</title>
    <style>
        /* Simple centering styles for the loading message */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            font-size: 1.2em;
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-container">
        Processing your free membership request...<br>
        You'll be redirected to WhatsApp shortly.
    </div>

    <script>
        // Google Apps Script Web App URL for counter increment
        const COUNTER_URL = 'https://script.google.com/macros/s/AKfycbwadiT9CIwUWUFORAQxUZopz7hqOHcEPdOVGQz7LEP3PHFJZAgMR2TmWaZzmavn-hLo/exec';

        async function incrementCounter() {
            try {
                // Fetch to increment counter
                const response = await fetch(COUNTER_URL, {
                    method: 'GET'
                });
                
                // Optional: Check response if needed
                const data = await response.json();
                console.log('Counter updated:', data);

                // Redirect to WhatsApp
                window.location.href = "https://api.whatsapp.com/send?phone=918306709827&text=I%20want%20my%20Free%20Membership";
            } catch (error) {
                console.error('Error updating counter:', error);
                // Fallback redirect
                window.location.href = "https://api.whatsapp.com/send?phone=918306709827&text=I%20want%20my%20Free%20Membership";
            }
        }

        // Call when page loads
        window.onload = incrementCounter;
    </script>
</body>
</html>
