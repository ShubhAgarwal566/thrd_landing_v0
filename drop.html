<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRD Drop Live 🔥</title>
    <link rel="stylesheet" href="./css/membership.css" />
    <style>
        /* Text styling for the announcement message */
.loading-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: "ClashDisplay", Arial, sans-serif;
  font-size: 1.4em;
  color: #222;
  text-align: center;
  flex-direction: column;
  gap: 30px;
  padding: 20px;
  line-height: 1.8;
}

/* Add animation for the announcement text */
.announcement-text {
  max-width: 600px;
  animation: fadeIn 1s ease-in;
}

/* Style the highlighted text */
.highlight {
  font-family: "ClashDisplaySemiBold", Arial, sans-serif;
  font-size: 1.2em;
  color: #000;
  background: linear-gradient(to right, rgba(255,255,255,0), #f5f5f5, rgba(255,255,255,0));
  padding: 5px 10px;
  margin: 15px 0;
  display: inline-block;
}

/* Add animation for the discount text */
.discount-text {
  font-size: 1.4em;
  font-weight: bold;
  color: #000;
  padding: 10px 0;
  position: relative;
  display: inline-block;
}

.discount-text::after {
  content: '';
  position: absolute;
  bottom: 5px;
  left: 0;
  width: 100%;
  height: 3px;
  background: #000;
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.5s ease;
}

.discount-text:hover::after {
  transform: scaleX(1);
  transform-origin: left;
}

/* Button styling enhancement */
.btn {
  background-color: black;
  color: white;
  font-family: "ClashDisplay", Arial, sans-serif;
  font-size: 18px;
  padding: 15px 35px;
  border: none;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  margin-top: 15px;
}

.btn:hover {
  background-color: white;
  color: black;
  border: 2px solid black;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.btn:active {
  background-color: white;
  color: black;
  border-radius: 5px;
  transform: translateY(0);
}

/* Added animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Emoji animation */
.emoji {
  display: inline-block;
  animation: bounce 1s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-5px); }
}
    </style>
</head>
<body>
    <nav class="navBar">
        <ul class="navbarelements">
          <li class="navitem left">
            <a class="shop-link" href="./request_access.html">SHOP</a>
          </li>
          <li class="navitem name"><a href="./index.html">THRD</a></li>
          <li class="navitem right"><a href="./our_story.html">ABOUT</a></li>
        </ul>
    </nav>
    
    <div id="loading" class="loading-container">
        <div class="announcement-text">
            <div class="highlight">Hurray! Our Next Drop is <span class="emoji">🎉</span> LIVE <span class="emoji">🎉</span></div>
            
            <div class="discount-text"><span class="emoji">🔥</span> 70% OFF on ALL Top Brands! <span class="emoji">🔥</span></div>
            
            <div>Shop Now – Limited Stocks, Don't Miss Out! <span class="emoji">🛍️</span></div>
        </div>
        
        <button class="btn" onclick="manualRedirect()">SHOP NOW</button>
    </div>

    <script>
        // Google Apps Script Web App URL for counter increment
        const URL = "https://shop.thrd.store";

        // Manual redirect function for button click
        function manualRedirect() {
            window.open(URL, '_blank');
        }
    </script>
</body>
</html>
