<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive QR Code Generator and Scanner</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 80vh;
            padding: 20px;
        }
        #qrVideoContainer {
            width: 100%; /* Adjusts the size of the video display */
            position: relative;
            display: none; /* Hidden initially */
        }
        video {
            width: 100%;
            height: auto; /* Maintain aspect ratio */
            transform: rotateX(180deg);
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
        }
        .next-btn{
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
        }
        #inputText {
            width: 100%; 
            font-size: 32px; 
            padding: 8px 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            display: block; 
        }
        #btnScanQR {
            padding: 12px 24px; 
            font-size: 18px; 
            background-color: #bbbbbb; 
            color: black; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            outline: black; 
        }
        .blank {
            display: none;
            justify-content: space-around;
            background-color: red;
            align-items: center;
            width: 100%;
            height: 100vh; 
        }
        .blankButton{
            padding: 12px 24px; 
            font-size: 18px; 
            background-color: #bbbbbb; 
            color: black; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            outline: black; 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top part: Button to trigger QR code scanning -->
        <button id="btnScanQR">Scan QR Code3</button>
        <div id="qrVideoContainer">
            <video id="qrVideo"></video>
            <button class="next-btn" onclick="nextCamera()">></button>
            <button class="close-btn" onclick="closeScanner()">&times;</button>
        </div>
        <!-- Middle part: QR code display -->
        <div id="qrCode"></div>
        <!-- Bottom part: Input field -->
        <input type="text" id="inputText" placeholder="Enter number" oninput="generateQR()">
        <div id="countdownTimer" style="display: none; font-size: 1em; text-align: center;"></div>

    </div>
    <audio id="backgroundAudio" loop>
        <source src="audio/siren.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>
    
    <div class="blank">
        <button class="blankButton" onClick="oldClick()">old</button>
        <button class="blankButton" onClick="newClick()">new</button>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdn.rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <script>
        const duration = 5000;

        const container = document.querySelector('.container');
        const blank = document.querySelector('.blank');
        const qrCodePlace = document.getElementById('qrCode');
        const inputText = document.getElementById('inputText');
        const qrVideo = document.getElementById('qrVideo');
        const qrVideoContainer = document.getElementById('qrVideoContainer');
        const audioElement = document.getElementById('backgroundAudio');

        let scanner = new Instascan.Scanner({ video: qrVideo });
        let cameras = [];
        let camNum = parseInt(localStorage.getItem('camNum')) || 0;
        let clearScreenTimeout;
        let countdownInterval;
        const countdownDisplay = document.getElementById('countdownTimer');
        function loadCamera(cameraIndex) {
            scanner.stop();
            if (cameras.length > 0) {
                const selectedCamera = cameras[cameraIndex % cameras.length];
                scanner.start(selectedCamera);
            }
        }
    
        function nextCamera() {
            camNum = (camNum + 1) % cameras.length;
            localStorage.setItem('camNum', camNum);
            loadCamera(camNum);
        }
    
        function generateQR() {
            qrCodePlace.innerHTML = ''; // Clear previous QR code
            if (inputText.value.trim() !== '') {
                new QRCode(qrCodePlace, inputText.value);
            }
            clearScreen(duration);
        }
    
        Instascan.Camera.getCameras().then(function (availableCameras) {
            cameras = availableCameras;
            if (cameras.length > 0) {
                document.getElementById('btnScanQR').onclick = function() {
                    qrVideoContainer.style.display = 'block';
                    loadCamera(camNum);
                };
            } else {
                console.error('No cameras found.');
            }
        }).catch(function (e) {
            console.error(e);
        });
    
        function closeScanner() {
            qrVideoContainer.style.display = 'none';
            scanner.stop();
        }
    
        scanner.addListener('scan', function (content) {
            content = content.trim();
            if (/^\d+$/.test(content)) { // Check if the content is only digits
                inputText.value = content;
                closeScanner(); 
                generateQR();

            }
        });
        function clearScreen(duration){
            clearInterval(countdownInterval);
            let remainingTime = duration / 1000;
            countdownDisplay.style.display = 'block';
            
            countdownInterval = setInterval(() => {
                countdownDisplay.textContent = `${remainingTime--}`;
                if (remainingTime < 0) {
                    countdownDisplay.textContent = '';
                    container.setAttribute('style', 'display: none');
                    blank.setAttribute('style', 'display: flex');
                    clearInterval(countdownInterval);
                    audioElement.play();
                }
            }, 1000);
        }
        function oldClick(){
            container.setAttribute('style', 'display: flex');
            blank.setAttribute('style', 'display: none');
            clearScreen(duration);
            audioElement.pause();
            audioElement.currentTime = 0
        }
        function newClick(){
            container.setAttribute('style', 'display: flex');
            blank.setAttribute('style', 'display: none');
            qrCodePlace.innerHTML = '';
            inputText.value = '';
            audioElement.pause();
            audioElement.currentTime = 0
        }
    </script>
</body>
</html>
