<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive QR Code Generator and Scanner</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 80vh;
            padding: 20px;
        }
        #qrVideoContainer {
            width: 100%; /* Adjusts the size of the video display */
            position: relative;
            display: none; /* Hidden initially */
        }
        video {
            width: 100%;
            height: auto; /* Maintain aspect ratio */
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
        }
        #inputText {
            width: 100%; 
            font-size: 32px; 
            padding: 8px 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            display: block; 
        }
        #btnScanQR {
            padding: 12px 24px; 
            font-size: 18px; 
            background-color: #bbbbbb; 
            color: black; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            outline: black; 
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top part: Button to trigger QR code scanning -->
        <button id="btnScanQR">Scan QR Code2</button>
        <div id="qrVideoContainer">
            <video id="qrVideo"></video>
            <button class="close-btn" onclick="closeScanner()">&times;</button>
        </div>
        <!-- Middle part: QR code display -->
        <div id="qrCode"></div>
        <!-- Bottom part: Input field -->
        <input type="text" id="inputText" placeholder="Enter number" oninput="generateQR()">
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdn.rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <script>
        const qrCodePlace = document.getElementById('qrCode');
        const inputText = document.getElementById('inputText');
        const qrVideo = document.getElementById('qrVideo');
        const qrVideoContainer = document.getElementById('qrVideoContainer');
        let scanner = new Instascan.Scanner({ video: qrVideo });

        function generateQR() {
            qrCodePlace.innerHTML = ''; // Clear previous QR code
            if (inputText.value.trim() !== '') {
                new QRCode(qrCodePlace, inputText.value);
            }
        }

        Instascan.Camera.getCameras().then(function (cameras) {
            if (cameras.length > 1) {
                document.getElementById('btnScanQR').onclick = function() {
                    qrVideoContainer.style.display = 'block';
                    scanner.start(cameras[1]);
                };
            } else {
                console.error('No cameras found.');
            }
        }).catch(function (e) {
            console.error(e);
        });

        function closeScanner() {
            qrVideoContainer.style.display = 'none';
            scanner.stop();
        }

        scanner.addListener('scan', function (content) {
            inputText.value = content;
            content = content.trim();
            if (/^\d+$/.test(content)) { // Check if the content is only digits
                inputText.value = content;
                closeScanner(); 
                generateQR(); 
            }
        });
    </script>
</body>
</html>
