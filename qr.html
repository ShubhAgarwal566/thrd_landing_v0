<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive QR Code Generator and Scanner</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 80vh;
            padding: 20px;
        }
        #qrVideoContainer {
            width: 100%;
            position: relative;
            display: none;
        }
        video {
            width: 100%;
            height: auto;
            transform: rotateY(180deg);
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
        }
        .next-btn{
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
            background-color: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            padding: 5px 10px;
        }
        #inputText {
            width: 100%; 
            font-size: 32px; 
            padding: 8px 10px; 
            box-sizing: border-box; 
            border: 1px solid #ccc; 
            display: block; 
        }
        #btnScanQR {
            padding: 12px 24px; 
            font-size: 18px; 
            background-color: #bbbbbb; 
            color: black; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            outline: black; 
        }
        .blank {
            display: none;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            height: 100vh; 
        }
        .blankButton{
            padding: 12px 24px; 
            font-size: 18px; 
            background-color: #bbbbbb; 
            color: black; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            outline: black; 
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="btnScanQR">Scan QR Code3</button>
        <div id="qrVideoContainer">
            <video id="qrVideo"></video>
            <button class="next-btn" onclick="nextCamera()">></button>
            <button class="close-btn" onclick="closeScanner()">&times;</button>
        </div>
        <div id="qrCode"></div>
        <input type="text" id="inputText" placeholder="Enter number" oninput="generateQR()">
        <div id="countdownTimer" style="display: none; font-size: 1em; text-align: center;"></div>

        <div style="margin-top: 10px;">
            <input type="number" id="durationInput">
            <button onclick="updateDuration()">Update</button>
        </div>
    </div>
    <div class="blank">
        <button class="blankButton" onClick="oldClick()">old</button>
        <button class="blankButton" onClick="newClick()">new</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
    <script src="https://cdn.rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
    <script>
        let duration = 60000;

        const container = document.querySelector('.container');
        const blank = document.querySelector('.blank');
        const qrCodePlace = document.getElementById('qrCode');
        const inputText = document.getElementById('inputText');
        const qrVideo = document.getElementById('qrVideo');
        const qrVideoContainer = document.getElementById('qrVideoContainer');
        let scanner = new Instascan.Scanner({ video: qrVideo });
        let cameras = [];
        let camNum = parseInt(localStorage.getItem('camNum')) || 0;
        let clearScreenTimeout;
        let countdownInterval;
        const countdownDisplay = document.getElementById('countdownTimer');

        function loadCamera(cameraIndex) {
            scanner.stop();
            if (cameras.length > 0) {
                const selectedCamera = cameras[cameraIndex % cameras.length];
                scanner.start(selectedCamera);
            }
        }

        function nextCamera() {
            camNum = (camNum + 1) % cameras.length;
            localStorage.setItem('camNum', camNum);
            loadCamera(camNum);
        }

        function generateQR() {
            qrCodePlace.innerHTML = '';
            if (inputText.value.trim() !== '') {
                new QRCode(qrCodePlace, inputText.value);
            }
        }

        Instascan.Camera.getCameras().then(function (availableCameras) {
            cameras = availableCameras;
            if (cameras.length > 0) {
                document.getElementById('btnScanQR').onclick = function() {
                    qrVideoContainer.style.display = 'block';
                    loadCamera(camNum);
                };
            } else {
                console.error('No cameras found.');
            }
        }).catch(function (e) {
            console.error(e);
        });

        function closeScanner() {
            qrVideoContainer.style.display = 'none';
            scanner.stop();
        }

        scanner.addListener('scan', function (content) {
            content = content.trim();
            if (/^\d+$/.test(content)) {
                inputText.value = content;
                closeScanner(); 
                generateQR();
                clearScreen(duration);
            }
        });

        function clearScreen(duration) {
            clearInterval(countdownInterval);
            let remainingTime = duration / 1000;
            countdownDisplay.style.display = 'block';

            countdownInterval = setInterval(() => {
                countdownDisplay.textContent = `${remainingTime--}`;
                if (remainingTime < 0) {
                    countdownDisplay.textContent = '';
                    container.style.display = 'none';
                    blank.style.display = 'flex';
                    clearInterval(countdownInterval);
                }
            }, 1000);
        }

        function updateDuration() {
            const newDuration = parseInt(document.getElementById('durationInput').value);
            if (!isNaN(newDuration) && newDuration > 0) {
                duration = newDuration*1000;
            } else {
                alert('Please enter a valid positive number for duration.');
            }
        }

        function oldClick() {
            container.style.display = 'flex';
            blank.style.display = 'none';
            clearScreen(duration);
        }

        function newClick() {
            container.style.display = 'flex';
            blank.style.display = 'none';
            qrCodePlace.innerHTML = '';
            inputText.value = '';
        }
    </script>
</body>
</html>
