<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Landing Page</title>
    <link rel="stylesheet" href="/css/membership.css" />
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        
        /* Main hero container */
        .hero-container {
            position: relative;
            min-height: 100vh;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Background pattern styling */
        .bg-pattern {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        
        .bg-radial-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0,0,0,0.05) 0, rgba(0,0,0,0) 70%);
        }
        
        .grid-pattern {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 1rem;
            opacity: 0.05;
        }
        
        .grid-item {
            border: 1px solid black;
        }
        
        /* Content container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
            z-index: 10;
            position: relative;
        }
        
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        /* Heading styles */
        .heading {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
            color: black;
            line-height: 1.2;
        }
        
        .highlight {
            position: relative;
            display: inline-block;
            z-index: 10;
        }
        
        .highlight-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0.75rem;
            background-color: #e5e7eb;
            transform: rotate(-1deg);
        }
        
        /* Description text */
        .description {
            font-size: 1.125rem;
            color: #4b5563;
            max-width: 42rem;
            margin-bottom: 3rem;
        }
        
        /* Button area */
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .join-button {
            background-color: black;
            color: white;
            font-weight: 500;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            font-size: 1rem;
        }
        
        .join-button:hover {
            background-color: #333;
            transform: scale(1.05);
        }
        
        .join-button:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.2);
        }
        
        /* Early access text */
        .early-access {
            margin-top: 1rem;
            position: relative;
        }
        
        .early-access-text {
            font-size: 0.875rem;
            color: #6b7280;
            font-weight: 500;
            display: flex;
            align-items: center;
        }
        
        .pulse {
            animation: pulse 2s infinite;
            margin: 0 0.5rem;
        }
        
        .divider {
            position: absolute;
            bottom: -1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 6rem;
            height: 0.125rem;
            background-color: #e5e7eb;
        }
        
        /* Abstract shapes */
        .square {
            display: none;
            position: absolute;
            top: 25%;
            left: 3rem;
            width: 3rem;
            height: 3rem;
            border: 2px solid black;
            opacity: 0.1;
            transform: rotate(45deg);
        }
        
        .circle {
            display: none;
            position: absolute;
            bottom: 25%;
            right: 4rem;
            width: 5rem;
            height: 5rem;
            border: 2px solid black;
            border-radius: 50%;
            opacity: 0.1;
        }
        
        /* Animation keyframes */
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        /* Media queries */
        @media (min-width: 768px) {
            .heading {
                font-size: 3.75rem;
            }
            
            .description {
                font-size: 1.25rem;
            }
            
            .square, .circle {
                display: block;
            }
        }
        
        @media (min-width: 1024px) {
            .heading {
                font-size: 4.5rem;
            }
        }
    </style>
</head>
