<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>THRD — Republic Protocol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#050505" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      /* REPUBLIC PALETTE (CYBER VARIANT) */
      --bg: #050505;
      --saffron: #FF9933;
      --white: #F0F0F0;
      --green: #138808;
      --chakra-blue: #06038D; /* Ashoka Blue */
      --dim: #333;
      
      --font-display: 'Silkscreen', cursive;
      --font-mono: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; }
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: var(--white); 
      font-family: var(--font-mono); min-height: 100vh; width: 100vw; overflow-x: hidden;
    }

    /* === HEADER === */
    .nav-strip {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      padding: 20px 24px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(5,5,5,0.95); backdrop-filter: blur(5px);
      border-bottom: 1px solid #222;
    }
    
    /* LOGO: Updated to Silkscreen Bold (700) */
    .logo { 
      font-family: var(--font-display); 
      font-weight: 700; 
      font-size: 24px; 
      color: #fff; 
      text-transform: uppercase; 
    }
    
    .nav-link { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #aaa; text-decoration: none; }

    /* === BACKGROUND FX === */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px; animation: scan 8s linear infinite;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }

    /* === MAIN CONTAINER === */
    .container {
      position: relative; z-index: 10; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 20px 20px; /* Top padding clears the fixed header */
    }

    /* === STATE 1: LOCKED (LANDING) === */
    #state-locked { 
      display: flex; flex-direction: column; align-items: center; gap: 30px; 
      width: 100%; max-width: 450px; text-align: center; margin-top: 20px;
    }

    /* 16:9 Image Placeholder (Top) */
    .hero-image-frame {
      width: 100%; aspect-ratio: 16/9;
      background: #111; border: 1px solid #333;
      display: flex; justify-content: center; align-items: center;
      position: relative; overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    /* Grid lines for placeholder */
    .hero-image-frame::after {
      content: ""; position: absolute; inset: 0;
      background-image: linear-gradient(#222 1px, transparent 1px), linear-gradient(90deg, #222 1px, transparent 1px);
      background-size: 20px 20px; opacity: 0.3;
    }
    .img-label { font-size: 10px; color: #555; text-transform: uppercase; z-index: 2; letter-spacing: 1px; }

    .protocol-title h1 {
      font-family: var(--font-display); font-size: 2.2rem; 
      text-transform: uppercase; line-height: 1.1; margin: 0;
      text-shadow: 2px 2px 0px var(--saffron), -2px -2px 0px var(--green);
    }
    .protocol-title .sub {
      color: #888; letter-spacing: 1px; font-size: 0.75rem; margin-top: 8px;
      text-transform: uppercase; border-top: 1px solid #222; padding-top: 8px; display: inline-block;
    }

    .btn-unlock {
      background: transparent; color: var(--saffron);
      border: 1px solid var(--saffron); padding: 18px 24px;
      font-family: var(--font-display); font-size: 0.9rem; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.2s; position: relative; width: 100%;
    }
    .btn-unlock:hover { background: var(--saffron); color: #000; box-shadow: 0 0 20px rgba(255, 153, 51, 0.4); }

    /* === STATE 2: LOADING (HUD CHAKRA) === */
    #state-loading { 
      display: none; width: 100%; height: 60vh; 
      flex-direction: column; justify-content: center; align-items: center; 
    }

    /* Advanced Graphic Chakra */
    .hud-chakra {
      width: 120px; height: 120px; position: relative;
      display: flex; justify-content: center; align-items: center;
      margin-bottom: 40px;
    }
    
    /* Outer Ring (Static) */
    .ring-outer {
      position: absolute; inset: 0; border-radius: 50%;
      border: 1px dashed #333;
    }
    
    /* Middle Ring (Spinning) */
    .ring-spin {
      position: absolute; inset: 10px; border-radius: 50%;
      border: 2px solid transparent; border-top-color: var(--chakra-blue); border-bottom-color: var(--chakra-blue);
      animation: spin 3s linear infinite;
      box-shadow: 0 0 15px rgba(6, 3, 141, 0.5);
    }
    
    /* Spokes (The Chakra) */
    .spokes {
      position: absolute; inset: 20px; border-radius: 50%;
      background: repeating-conic-gradient(transparent 0deg 13deg, var(--chakra-blue) 14deg 15deg);
      animation: spin-rev 6s linear infinite; opacity: 0.8;
    }
    
    /* Core */
    .core {
      width: 10px; height: 10px; background: var(--white); border-radius: 50%;
      box-shadow: 0 0 10px var(--white); z-index: 2;
    }

    /* Loading Text & Bar */
    .loader-content { text-align: center; width: 100%; max-width: 300px; }
    
    .terminal-text {
      color: var(--green); font-size: 0.8rem; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 10px; min-height: 1.2em;
    }
    
    .progress-track {
      width: 100%; height: 2px; background: #222; position: relative; overflow: hidden;
    }
    .progress-fill {
      position: absolute; left: 0; top: 0; height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--saffron), var(--white), var(--green));
      animation: fillBar 3s ease-in-out forwards;
    }

    /* === STATE 3: REVEAL (POPUP) === */
    #state-reveal {
      display: none; width: 100%; max-width: 400px; margin-top: 40px;
      background: #0a0a0a; border: 1px solid #333;
      padding: 30px 24px; position: relative; text-align: center;
      border-top: 4px solid var(--saffron); border-bottom: 4px solid var(--green);
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
      animation: slideUp 0.5s ease-out;
    }

    .reveal-header {
      font-size: 0.75rem; color: var(--green); letter-spacing: 2px; 
      text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px dashed #333; padding-bottom: 10px;
    }
    
    .big-offer {
      font-family: var(--font-mono); font-weight: 700; font-size: 2.8rem; line-height: 1; margin: 15px 0 5px;
      color: var(--white); letter-spacing: -2px;
    }
    
    .offer-desc { font-size: 0.85rem; color: #888; margin-bottom: 25px; text-transform: uppercase; }

    .code-box {
      background: #151515; border: 1px dashed #444; color: var(--saffron);
      padding: 12px; font-size: 1.2rem; letter-spacing: 1px; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: border-color 0.2s;
    }
    .code-box:hover { border-color: var(--saffron); }
    .copy-link { font-size: 0.7rem; color: #666; text-decoration: underline; text-transform: uppercase;}

    .timer-box {
      display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;
      padding: 10px; border: 1px solid #222;
    }
    .t-num { font-family: var(--font-mono); font-weight: 700; font-size: 1.2rem; color: #fff; }
    .t-lbl { font-size: 0.6rem; color: #555; text-transform: uppercase; display: block; margin-top: 4px;}

    .btn-shop {
      display: block; width: 100%; padding: 18px;
      background: var(--white); color: #000;
      font-family: var(--font-mono); font-weight: 700; font-size: 1rem;
      text-transform: uppercase; text-decoration: none; letter-spacing: 1px;
      animation: pulseBtn 2s infinite;
    }

    /* CONFETTI CANVAS */
    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 20; }

    /* ANIMATIONS */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-rev { 100% { transform: rotate(-360deg); } }
    @keyframes fillBar { 0% { width: 0%; } 100% { width: 100%; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

  </style>
</head>
<body>

  <div class="scanlines"></div>
  <canvas id="confetti"></canvas>

  <nav class="nav-strip">
    <a href="/request_access" class="nav-link">SHOP</a>
    <div class="logo">THRD</div>
    <a href="/our_story" class="nav-link">ABOUT</a>
  </nav>

  <div class="container">
    
    <div id="state-locked">
      <div class="hero-image-frame">
        <div class="img-label">
<img 
  src="./images/republic/republic.jpeg"
  style="object-fit: contain; height: 100%; width: 100%;"
/>
        </div>
        </div>
      
      <div class="protocol-title">
        <h1>Republic<br>Protocol</h1>
        <div class="sub">The Nation Celebrates. The Streets Represent.</div>
      </div>
      
      <button class="btn-unlock" onclick="startProtocol()">[ Unlock Republic Archive ]</button>
    </div>

    <div id="state-loading">
      <div class="hud-chakra">
        <div class="ring-outer"></div>
        <div class="ring-spin"></div>
        <div class="spokes"></div>
        <div class="core"></div>
      </div>

      <div class="loader-content">
        <div class="terminal-text" id="termText">AUTHENTICATING...</div>
        <div class="progress-track"><div class="progress-fill"></div></div>
      </div>
    </div>

    <div id="state-reveal">
      <div class="reveal-header">/// ACCESS GRANTED ///</div>
      
      <div class="big-offer">FLAT 26% OFF</div>
      <div class="offer-desc">On Entire Inventory. No Exceptions.</div>
      
      <div class="code-box" id="codeContainer" onclick="copyCode(this)">
        <span id="code">REPUBLIC26</span>
        <span class="copy-link" id="copyLabel">TAP TO COPY</span>
      </div>

      <div class="timer-box">
        <div class="t-seg"><span class="t-num" id="h">00</span><span class="t-lbl">HOURS</span></div>
        <div class="t-seg"><span class="t-num">:</span></div>
        <div class="t-seg"><span class="t-num" id="m">00</span><span class="t-lbl">MINS</span></div>
        <div class="t-seg"><span class="t-num">:</span></div>
        <div class="t-seg"><span class="t-num" id="s">00</span><span class="t-lbl">SECS</span></div>
      </div>
      
      <a href="shop.html" class="btn-shop">SHOP NOW</a>
    </div>

  </div>

  <script>
    // === 1. LOGIC FLOW ===
    function startProtocol() {
      // Transition to Loading (Flex box to keep centered)
      document.getElementById('state-locked').style.display = 'none';
      document.getElementById('state-loading').style.display = 'flex';

      const term = document.getElementById('termText');
      
      // Text Sequence
      setTimeout(() => term.innerText = "VERIFYING LOCATION: INDIA...", 800);
      setTimeout(() => term.innerText = "CHECKING INVENTORY DEPTH...", 1800);
      setTimeout(() => term.innerText = "ACTIVATING 26% PROTOCOL...", 2600);

      // Transition to Reveal
      setTimeout(() => {
        document.getElementById('state-loading').style.display = 'none';
        document.getElementById('state-reveal').style.display = 'block';
        fireConfetti();
        // Attempt Auto-Copy
        attemptAutoCopy();
      }, 3000);
    }

    // === 2. COPY CODE LOGIC ===
    function attemptAutoCopy() {
      const code = document.getElementById('code').innerText;
      // Try copy (Might be blocked by some browsers without direct click)
      navigator.clipboard.writeText(code).then(() => {
        showCopiedState();
      }).catch(err => {
        console.log("Auto-copy blocked (Expected on some mobile browsers). User must tap.");
      });
    }

    function copyCode(box) {
      const code = document.getElementById('code').innerText;
      navigator.clipboard.writeText(code);
      showCopiedState();
    }

    function showCopiedState() {
      const label = document.getElementById('copyLabel');
      const originalText = "TAP TO COPY";
      
      label.innerText = "COPIED";
      label.style.color = "#138808"; // Green
      
      setTimeout(() => {
        label.innerText = originalText;
        label.style.color = "#666";
      }, 2000);
    }

    // === 3. TIMER (Ends 26 Jan 2026, 23:59 IST) ===
    const endDate = new Date('2026-01-26T23:50:59+05:30').getTime();

    function updateTimer() {
      const now = new Date().getTime();
      const diff = endDate - now;

      if (diff < 0) {
        document.getElementById('h').innerText = "00";
        document.getElementById('m').innerText = "00";
        document.getElementById('s').innerText = "00";
        return;
      }

      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60) + Math.floor(diff / (1000 * 60 * 60 * 24)) * 24); 
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('h').innerText = String(h).padStart(2, '0');
      document.getElementById('m').innerText = String(m).padStart(2, '0');
      document.getElementById('s').innerText = String(s).padStart(2, '0');
    }
    
    setInterval(updateTimer, 1000);
    updateTimer();

    // === 4. CONFETTI (Tricolor Particles) ===
    function fireConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];
      const colors = ['#FF9933', '#FFFFFF', '#138808']; // Saffron, White, Green

      for (let i = 0; i < 150; i++) {
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: (Math.random() - 0.5) * 15,
          vy: (Math.random() - 0.5) * 15,
          life: 100 + Math.random() * 50,
          color: colors[Math.floor(Math.random() * colors.length)],
          size: Math.random() * 6 + 2
        });
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
          let p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.2; // Gravity
          p.life--;
          
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.size, p.size);

          if (p.life <= 0) particles.splice(i, 1);
        }
        if (particles.length > 0) requestAnimationFrame(render);
      }
      render();
    }
  </script>
</body>
</html>
