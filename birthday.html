<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>THRD — BIRTHDAY ARCHIVE 🎈</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#F8F8F5" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Press+Start+2P&family=Silkscreen:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Sunset Birthday Palette */
            --bg: #F8F8F5;       /* Warm Paper Off-White */
            --ink: #0A0A0A;      /* Brutalist Black */
            --orange: #FF5E00;   /* Sunset Orange */
            --yellow: #FFD700;   /* Warm Yellow */
            --grey: #666666;
            
            --font-logo: 'Silkscreen', cursive;
            --font-pixel: 'Press Start 2P', cursive;
            --font-body: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* APP CONSTRAINT: No scrolling, locked viewport */
        html, body { 
            background: var(--bg); color: var(--ink); 
            font-family: var(--font-body); 
            height: 100vh; width: 100vw; overflow: hidden;
            background-image: radial-gradient(var(--grey) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        /* === HEADER === */
        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            padding: 15px 0; background: rgba(248, 248, 245, 0.95);
            border-bottom: 2px solid var(--ink);
            display: flex; justify-content: center; align-items: center;
        }
        .logo { font-family: var(--font-logo); font-size: 24px; font-weight: 700; color: var(--ink); text-transform: uppercase; }

        /* === MAIN CONTAINER === */
        .app-container {
            position: relative; z-index: 10; height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 70px 20px 30px; /* Accounts for header and safe areas */
        }

        /* === STATE 1 & 2: WAITING ROOM / UNLOCK === */
        #state-waiting { 
            display: flex; flex-direction: column; 
            justify-content: space-evenly; /* This forces the gap between the two halves */
            align-items: center; 
            width: 100%; max-width: 400px; height: 100%; text-align: center;
        }

        /* The Structural Halves */
        .waiting-top-half {
            display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%;
        }
        .waiting-bottom-half {
            display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%;
        }

        .date-badge {
            background: var(--ink); color: #FFF; font-weight: 900; font-size: 11px;
            padding: 6px 12px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Image Frame */
        .hero-frame {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #FFF;
            border: 3px solid var(--ink);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transition: box-shadow 0.3s ease;
        }

        .hero-frame::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(#EAEAEA 1px, transparent 1px),
                linear-gradient(90deg, #EAEAEA 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.18;
            pointer-events: none;
            z-index: 2;
        }

        .frame-label {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: block;
        }

        .frame-label img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            object-position: center;
            background: #FFF;
        }
        /* Timer Block */
        .timer-block { display: flex; flex-direction: column; gap: 10px; }
        .timer-label { font-weight: 900; font-size: 12px; color: var(--grey); text-transform: uppercase; letter-spacing: 1px; }
        .timer-display { font-family: var(--font-pixel); font-size: 28px; color: var(--orange); }
        
        .timer-live-text { font-family: var(--font-pixel); font-size: 18px; color: var(--orange); line-height: 1.4; display: none; }
        .timer-live-text.blink { animation: blinker 1s steps(2, start) infinite; }

        /* The Button */
        .action-btn {
            width: 100%; padding: 20px; font-family: var(--font-body); font-weight: 900; font-size: 14px;
            text-transform: uppercase; cursor: pointer; border: 3px solid var(--ink);
            transition: all 0.2s; position: relative; z-index: 20;
        }
        .action-btn.excited { background: #FFF; color: var(--ink); box-shadow: 6px 6px 0 var(--yellow); }
        .action-btn.excited:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0 var(--yellow); }
        .action-btn.unlock { background: var(--ink); color: #FFF; box-shadow: 8px 8px 0 var(--orange); }
        .action-btn.unlock:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0 var(--orange); }

        /* === STATE 3A: THE LOADER === */
        #state-loader { 
            display: none; width: 100%; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .gift-icon { font-size: 48px; animation: shake 0.5s infinite; }
        .terminal-text { font-family: var(--font-pixel); font-size: 10px; color: var(--ink); text-transform: uppercase; }
        .progress-track { width: 100%; max-width: 250px; height: 10px; border: 2px solid var(--ink); padding: 2px; }
        .progress-fill { height: 100%; width: 0%; background: var(--orange); animation: fillBar 3s ease-in-out forwards; }

        /* === STATE 3B: THE PAYOFF (RECEIPT CARD) === */
        #state-reveal {
            display: none; width: 100%; max-width: 360px;
            background: #FFF; border: 3px solid var(--ink);
            padding: 30px 20px; text-align: center; position: relative; z-index: 30;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-top: 8px solid var(--orange); border-bottom: 8px solid var(--yellow);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-header { font-family: var(--font-pixel); font-size: 8px; color: #138808; margin-bottom: 20px; }
        .big-offer { font-family: var(--font-pixel); font-size: 32px; color: var(--ink); line-height: 1.2; margin-bottom: 10px; }
        .offer-desc { font-weight: 700; font-size: 12px; color: var(--grey); margin-bottom: 30px; text-transform: uppercase; }

        .code-box {
            background: var(--bg); border: 2px dashed var(--orange); padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; margin-bottom: 25px; transition: background 0.2s;
        }
        .code-box:active { background: #FFF5F0; }
        .code-text { font-family: var(--font-pixel); font-size: 16px; color: var(--ink); }
        .copy-label { font-weight: 900; font-size: 10px; color: var(--grey); text-transform: uppercase; }

        .shop-btn {
            display: block; width: 100%; padding: 20px; background: var(--yellow); color: var(--ink);
            font-weight: 900; font-size: 16px; text-decoration: none; text-transform: uppercase;
            border: 3px solid var(--ink); animation: pulseBtn 2s infinite;
        }

        /* === BALLOON PHYSICS === */
        .balloon {
            position: fixed; bottom: -100px; width: 30px; height: 40px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            pointer-events: none; z-index: 50; transition: transform 2s ease-out, opacity 2s ease-in;
        }

        /* === CONFETTI CANVAS === */
        #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 20; }

        /* === ANIMATIONS === */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes fillBar { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulseBtn { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        @keyframes blinker { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html" style="text-decoration: none; color: black;">THRD</a></div>
    </header>

    <canvas id="confetti"></canvas>

    <div class="app-container">
        
        <div id="state-waiting">
            
            <div class="waiting-top-half">
                <div class="date-badge">📅 25TH MARCH</div>
                <div id="hero-frame" class="hero-frame">
                    <div class="frame-label">
                        <img src="/images/birthday.jpeg" />
                    </div>
                </div>
            </div>
            
            <div class="waiting-bottom-half">
                <div class="timer-block">
                    <div id="timer-label" class="timer-label">MIDNIGHT MADNESS STARTS IN:</div>
                    <div id="timer-display" class="timer-display">00:00:00</div>
                    <div id="timer-live-text" class="timer-live-text blink">🟢 THE BIRTHDAY SALE IS LIVE.</div>
                </div>
                <button id="action-btn" class="action-btn excited" onclick="handleActionClick()">🎈 I AM EXCITED!</button>
            </div>

        </div>

        <div id="state-loader">
            <div class="gift-icon">🎁</div>
            <div class="progress-track"><div class="progress-fill"></div></div>
            <div id="terminal-text" class="terminal-text">CHECKING INVITATION...</div>
        </div>

        <div id="state-reveal">
            <div class="reveal-header">/// GIFT UNLOCKED ///</div>
            
            <div class="big-offer">FLAT 60% OFF</div>
            <div class="offer-desc">ON TOP OF 70% CLEARANCE.</div>
            
            <div class="code-box" onclick="copyCode()">
                <span id="discount-code" class="code-text">BIRTHDAY60</span>
                <span id="copy-label" class="copy-label">TAP TO COPY</span>
            </div>
            
            <a href="https://thrd.store/shop" class="shop-btn">🛒 SHOP NOW</a>
        </div>

    </div>

    <script>
        // === CONFIGURATION ===
        const TARGET_DATE = new Date('2026-03-25T00:00:00+05:30').getTime();
        let isLive = false;

        // === DOM ELEMENTS ===
        const stateWaiting = document.getElementById('state-waiting');
        const stateLoader = document.getElementById('state-loader');
        const stateReveal = document.getElementById('state-reveal');
        
        const timerLabel = document.getElementById('timer-label');
        const timerDisplay = document.getElementById('timer-display');
        const timerLiveText = document.getElementById('timer-live-text');
        
        const heroFrame = document.getElementById('hero-frame');
        const actionBtn = document.getElementById('action-btn');
        const terminalText = document.getElementById('terminal-text');

        // === 1. CLOCK & STATE MUTATION ENGINE ===
        function checkTime() {
            const now = new Date().getTime();
            const diff = TARGET_DATE - now;

            if (diff <= 0 && !isLive) {
                isLive = true;
                mutateToLiveState();
                return;
            }

            if (!isLive) {
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60) + Math.floor(diff / (1000 * 60 * 60 * 24)) * 24); 
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                
                const colon = s % 2 === 0 ? ':' : '<span style="opacity:0.3">:</span>';
                timerDisplay.innerHTML = `${String(h).padStart(2, '0')}${colon}${String(m).padStart(2, '0')}${colon}${String(s).padStart(2, '0')}`;
            }
        }

        function mutateToLiveState() {
            timerDisplay.style.display = 'none';
            timerLabel.style.display = 'none';
            timerLiveText.style.display = 'block';
            heroFrame.classList.add('live-glow');
            actionBtn.className = 'action-btn unlock';
            actionBtn.innerText = '🔓 UNLOCK BIRTHDAY DISCOUNT';
        }

        setInterval(checkTime, 1000);
        checkTime();

        // === 2. BUTTON INTERACTION ROUTER ===
        function handleActionClick() {
            if (!isLive) {
                shootBalloons();
            } else {
                startUnlockSequence();
            }
        }

        // === 3. BALLOON PHYSICS (State 1) ===
        function shootBalloons() {
            const colors = ['#FF5E00', '#FFD700', '#0A0A0A'];
            const numBalloons = 12;

            for (let i = 0; i < numBalloons; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                const startX = (window.innerWidth / 2) + ((Math.random() - 0.5) * 100);
                balloon.style.left = `${startX}px`;
                balloon.style.bottom = '-50px';
                
                document.body.appendChild(balloon);

                requestAnimationFrame(() => {
                    const endY = window.innerHeight + 100;
                    const endX = startX + ((Math.random() - 0.5) * 200); 
                    
                    balloon.style.transform = `translate(${endX - startX}px, -${endY}px)`;
                    balloon.style.opacity = '0';
                });

                setTimeout(() => { balloon.remove(); }, 2000);
            }
        }

        // === 4. UNLOCK SEQUENCE (State 2 -> 3A -> 3B) ===
        function startUnlockSequence() {
            stateWaiting.style.display = 'none';
            stateLoader.style.display = 'flex';

            setTimeout(() => terminalText.innerText = "BAKING THE CAKE...", 1000);
            setTimeout(() => terminalText.innerText = "UNLOCKING 60% OVERRIDE...", 2000);

            setTimeout(() => {
                stateLoader.style.display = 'none';
                stateReveal.style.display = 'block';
                fireConfetti();
                attemptAutoCopy();
            }, 3000);
        }

        // === 5. COPY CODE LOGIC ===
        function attemptAutoCopy() {
            const code = document.getElementById('discount-code').innerText;
            navigator.clipboard.writeText(code).then(() => {
                showCopiedState();
            }).catch(err => {
                console.log("Auto-copy blocked. User must tap.");
            });
        }

        function copyCode() {
            const code = document.getElementById('discount-code').innerText;
            navigator.clipboard.writeText(code);
            showCopiedState();
        }

        function showCopiedState() {
            const label = document.getElementById('copy-label');
            label.innerText = "COPIED!";
            label.style.color = "#138808"; 
            
            setTimeout(() => {
                label.innerText = "TAP TO COPY";
                label.style.color = "var(--grey)";
            }, 2000);
        }

        // === 6. CONFETTI ===
        function fireConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const colors = ['#FF5E00', '#FFD700', '#0A0A0A'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 1) * 20, 
                    life: 100 + Math.random() * 50,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 8 + 4
                });
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.4; 
                    p.life--;
                    
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);

                    if (p.life <= 0) particles.splice(i, 1);
                }
                if (particles.length > 0) requestAnimationFrame(render);
            }
            render();
        }
    </script>
</body>
</html>
