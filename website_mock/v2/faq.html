<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style_faq.css" />
    <title>Get in Touch</title>
  </head>
  <body>
    <section>
      <nav class="navBar">
        <ul class="navbarelements">
          <li class="navitem"><a href="">SHOP</a></li>
          <li class="navitem name"><a href="">THRD</a></li>
          <li class="navitem"><a href="">ABOUT</a></li>
        </ul>
      </nav>
      
      <div class="headingContainer">
          <h1>FAQ</h1>
      </div>
        
      <div id="faqSection">
      </div>
    </section>
    
    <script>
      const data = [
          {
              q: 'Are the clothes really branded and original?',
              a: 'Absolutely. Every garment we sell goes through a strict quality check and is THRD-Verified for authenticity.'
          },
          {
              q: 'What is your return policy?',
              a: 'We have a 30-day return policy. If you are not satisfied with your purchase, you can return it within 30 days for a full refund.'
          }
          // Add more questions and answers here as needed
      ];

      const faqSection = document.getElementById('faqSection');

      // Function to create a question/answer element
      function createFAQElement(question, answer) {
          const faqItem = document.createElement('div');
          faqItem.className = 'faq-item';

          const questionElement = document.createElement('div');
          questionElement.className = 'faq-question';

          const questionText = document.createElement('span');
          questionText.innerText = question;

          const arrowElement = document.createElement('span');
          arrowElement.className = 'faq-arrow';
          arrowElement.innerText = '▼';

          questionElement.appendChild(questionText);
          questionElement.appendChild(arrowElement);

          const answerElement = document.createElement('div');
          answerElement.className = 'faq-answer';
          answerElement.innerText = answer;

          faqItem.appendChild(questionElement);
          faqItem.appendChild(answerElement);

          questionElement.addEventListener('click', () => {
              if (answerElement.style.display === 'none') {
                  answerElement.style.display = 'block';
                  arrowElement.innerText = '▲';
              } else {
                  answerElement.style.display = 'none';
                  arrowElement.innerText = '▼';
              }
          });

          return faqItem;
      }

      // Populate FAQ section with data
      data.forEach(item => {
          const faqElement = createFAQElement(item.q, item.a);
          faqSection.appendChild(faqElement);
      });
  </script>


    <footer>
      <div class="links">
        <ul class="main">
          <li>ABOUT</li>
          <li>SOCIAL</li>
          <li>HELP</li>
        </ul>
        <ul class="sec">
          <li>Our Story</li>
          <li>Instagram</li>
          <li>Contact</li>
          <li>FAQ</li>
          <li>Policy</li>
        </ul>
      </div>
      <p class="cr">© THRD Premium Clothing</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js" integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+" crossorigin="anonymous"></script>
  </body>
