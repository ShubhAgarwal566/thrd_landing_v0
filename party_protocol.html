<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #2D2D2D;
            --input-bg: #404040;
            --accent: #FFD166;
            --text-color: #FFFFFF;
            --card-std: #118AB2;
            --card-virus: #EF476F;
            --card-game: #06D6A0;
            --card-cure: #FFC857;
            --shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        .screen.active {
            opacity: 1;
            pointer-events: all;
            z-index: 10;
            transform: scale(1);
        }

        .screen.hidden {
            transform: scale(0.95);
        }

        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        /* Player setup */
        #player-list {
            width: 100%;
            max-width: 400px;
            max-height: 50vh;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        #player-list::-webkit-scrollbar {
            width: 5px;
        }

        #player-list::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 5px;
        }

        .player-input-group {
            display: flex;
            margin-bottom: 10px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input {
            flex-grow: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--input-bg);
            color: white;
            font-size: 1.1rem;
            font-family: 'Fredoka', sans-serif;
            outline: none;
        }

        .remove-btn {
            background: #ff4757;
            border: none;
            color: white;
            width: 40px;
            margin-left: 10px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Buttons */
        .btn-main {
            background-color: var(--accent);
            color: #2D2D2D;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.1s;
            width: 80%;
            max-width: 300px;
            text-align: center;
            margin: 10px 0;
        }

        .btn-main:active {
            transform: scale(0.95);
        }

        .btn-main:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
        }

        .btn-main.btn-secondary {
            background-color: #505050;
            color: white;
        }

        /* Mode selection */
        .mode-btn {
            width: 100%;
            max-width: 350px;
            padding: 25px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mode-btn span {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.9;
            margin-top: 5px;
        }

        .mode-mild {
            background: #78d2e2;
        }

        .mode-dirty {
            background: #cc6969;
            border: 1px solid #333;
        }

        /* Game screen */
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .top-btn {
            background: #505050;
            color: #FFFFFF;
            border: none;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .top-btn:active {
            transform: scale(0.95);
        }

        .round-info {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .card {
            flex-grow: 1;
            border-radius: 25px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: background-color 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .card-category {
            position: absolute;
            top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            opacity: 0.8;
            font-weight: bold;
        }

        .card-text {
            font-size: 2rem;
            line-height: 1.4;
            font-weight: 600;
        }

        @media (max-width: 400px) {
            .card-text {
                font-size: 1.6rem;
            }
        }

        #virus-status {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-bottom: 10px;
            text-align: center;
            min-height: 1em;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            align-items: center;
        }

        /* Animations */
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .pulse {
            animation: pulse 0.3s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

        <div id="player-list"></div>
        <button class="btn-main btn-secondary" onclick="addPlayerInput()">+ Add Player</button>

            <div class="controls">

            </div>
        </div>
    </div>

    <!-- Screen 4: end screen -->

            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.classList.add('hidden');
            });
            const target = document.getElementById(screenId);
            target.classList.remove('hidden');
            target.classList.add('active');
        }

            const list = document.getElementById('player-list');
            if (list.children.length >= 20) return;

            const div = document.createElement('div');
            div.className = 'player-input-group';
            div.innerHTML = `
                <input type="text" placeholder="Player Name" value="${value}" onchange="savePlayers()">
                <button class="remove-btn" onclick="removePlayer(this)">×</button>
            `;
            list.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

            btn.parentElement.remove();
            savePlayers();
        }

        function savePlayers() {
            const inputs = document.querySelectorAll('#player-list input');
            players = Array.from(inputs)
                .map(i => i.value.trim())
                .filter(n => n !== "");
            localStorage.setItem('picolo_players', JSON.stringify(players));
        }

        function loadPlayers() {
            const stored = localStorage.getItem('picolo_players');
            if (stored) {
                players = JSON.parse(stored);
            }
        }

            const list = document.getElementById('player-list');
            list.innerHTML = '';
            players.forEach(p => addPlayerInput(p));
            if (players.length < 20) addPlayerInput();

            const deckSize = db[currentMode].length;
            if (deckSize === 0) return 0;

            const maxPossible = deckSize;
            const baseMin = Math.min(15, maxPossible);

            const minPlayers = 3;
            const maxPlayers = 20;
            const clampedPlayers = Math.min(Math.max(playerCount, minPlayers), maxPlayers);

            const factor = (clampedPlayers - minPlayers) / (maxPlayers - minPlayers);
            const roundsFloat = baseMin + factor * (maxPossible - baseMin);
            const rounds = Math.round(roundsFloat);

            return Math.min(Math.max(rounds, 1), maxPossible);
        }

        function updateRoundInfo() {
            const el = document.getElementById('round-info');
            if (!el) return;
            if (totalRounds <= 0) {
                el.innerText = "";
                return;
            }
            const currentRound = Math.min(roundsPlayed + 1, totalRounds);
            el.innerText = "Round " + currentRound + " / " + totalRounds;
        }

        function getCurrentRoundNumber() {
            // The card being drawn in this call to nextCard is roundsPlayed + 1
            return roundsPlayed + 1;
        }

        /* Helper for viruses */
        function getOldestInfectedPlayer() {
            if (activeViruses.length === 0) return null;
            return activeViruses[0].player;
        }

        function getOldestCureEligibleVirus() {
            if (activeViruses.length === 0) return null;
            const currentRound = getCurrentRoundNumber();
            const oldest = activeViruses[0];
            if (typeof oldest.infectedRound !== 'number') {
                // For safety, treat old entries without infectedRound as eligible
                return oldest;
            }
            const age = currentRound - oldest.infectedRound;
            if (age >= MIN_VIRUS_LIFETIME_ROUNDS) {
                return oldest;
            }
            return null;
        }

        /* Card validity checks */
        function isCardPlayable(card) {
            const activeCount = activeViruses.length;

            if (card.type === 'virus') {
                if (players.length === 0) return false;
                if (activeCount >= MAX_GLOBAL_VIRUSES) return false;

                const infectedSet = new Set(activeViruses.map(v => v.player));
                const healthyPlayers = players.filter(p => !infectedSet.has(p));

                if (healthyPlayers.length === 0) return false;

                if (card.infectsBoth) {
                    if (healthyPlayers.length < 2) return false;
                }

                return true;
            }

            if (card.type === 'cure') {
                return activeCount > 0;
            }

            return true;
        }

        /* Probability helpers and drawing */
        function hasCardOfType(type) {
            if (type === 'cure') {
                // Cure cards are virtual; available whenever at least one virus is active
                return activeViruses.length > 0;
            }

            if (!currentDeck || currentDeck.length === 0) {
                return false;
            }

            if (type === 'virus') {
                return currentDeck.some(card => card.type === 'virus' && isCardPlayable(card));
            }

            if (type === 'standard' || type === 'game') {
                return currentDeck.some(card => card.type === type);
            }

            return false;
        }

        function pickCardTypeForNextDraw() {
            const virusCount = activeViruses.length;
            const key = Math.max(0, Math.min(virusCount, 3));
            const base = typeProbabilities[key];

            const entries = [];
            const types = ['standard', 'game', 'virus', 'cure'];

            for (let i = 0; i < types.length; i++) {
                const t = types[i];
                const weight = base[t] || 0;
                if (weight <= 0) continue;
                if (!hasCardOfType(t)) continue;
                entries.push({ type: t, weight });
            }

            if (entries.length === 0) {
                return null;
            }

            let total = 0;
            for (let i = 0; i < entries.length; i++) {
                total += entries[i].weight;
            }

            let r = Math.random() * total;
            for (let i = 0; i < entries.length; i++) {
                if (r < entries[i].weight) {
                    return entries[i].type;
                }
                r -= entries[i].weight;
            }

            return entries[entries.length - 1].type;
        }

        function drawCardOfType(type) {
            if (type === 'cure') {
                const template = cureTemplates[currentMode] || "Cure card: {p1} is cured from their virus.";
                return {
                    text: template,
                    type: 'cure',
                    isVirtualCure: true
                };
            }

            if (!currentDeck || currentDeck.length === 0) {
                return null;
            }

            const candidateIndices = [];
            for (let i = 0; i < currentDeck.length; i++) {
                const card = currentDeck[i];
                if (card.type !== type) continue;
                if (!isCardPlayable(card)) continue;
                candidateIndices.push(i);
            }

            if (candidateIndices.length === 0) {
                return null;
            }

            const randomIndex = candidateIndices[Math.floor(Math.random() * candidateIndices.length)];
            const selectedCard = currentDeck[randomIndex];
            currentDeck.splice(randomIndex, 1);
            return selectedCard;
        }

        function drawNextCardData() {
            const cardType = pickCardTypeForNextDraw();
            if (!cardType) {
                return null;
            }
            return drawCardOfType(cardType);
        }

        /* Name injection helpers */
        function injectNames(text) {
            if (!players || players.length === 0) {
                return { text, p1: null, p2: null };
            }

            let p1 = players[Math.floor(Math.random() * players.length)];
            let p2 = null;

            if (text.includes('{p2}')) {
                if (players.length > 1) {
                    const others = players.filter(p => p !== p1);
                    if (others.length > 0) {
                        p2 = others[Math.floor(Math.random() * others.length)];
                    } else {
                        p2 = p1;
                    }
                } else {
                    p2 = p1;
                }
            }

            let finalText = text.replace(/{p1}/g, p1);
            if (p2 !== null) {
                finalText = finalText.replace(/{p2}/g, p2);
            }
            return { text: finalText, p1, p2 };
        }

        function injectNamesForVirus(card) {
            const text = card.text;
            const infectedSet = new Set(activeViruses.map(v => v.player));
            const healthyPlayers = players.filter(p => !infectedSet.has(p));

            if (healthyPlayers.length === 0) {
                return injectNames(text);
            }

            const p1 = healthyPlayers[Math.floor(Math.random() * healthyPlayers.length)];
            let p2 = null;

            if (text.includes('{p2}')) {
                if (card.infectsBoth) {
                    const otherHealthy = healthyPlayers.filter(p => p !== p1);
                    if (otherHealthy.length > 0) {
                        p2 = otherHealthy[Math.floor(Math.random() * otherHealthy.length)];
                    } else {
                        const others = players.filter(p => p !== p1);
                        if (others.length > 0) {
                            p2 = others[Math.floor(Math.random() * others.length)];
                        }
                    }
                } else {
                    const others = players.filter(p => p !== p1);
                    if (others.length > 0) {
                        p2 = others[Math.floor(Math.random() * others.length)];
                    } else {
                        p2 = p1;
                    }
                }
            }

            let finalText = text.replace(/{p1}/g, p1);
            if (p2 !== null) {
                finalText = finalText.replace(/{p2}/g, p2);
            }

            return { text: finalText, p1, p2 };
        }

        function injectNamesForCure() {
            const eligibleVirus = getOldestCureEligibleVirus();
            let targetPlayer = null;
            let text;

            if (eligibleVirus) {
                targetPlayer = eligibleVirus.player;
                const template = cureTemplates[currentMode] || "Cure card: {p1} is cured from their virus.";
                text = template.replace(/{p1}/g, targetPlayer || '');
            } else if (activeViruses.length > 0) {
                text = "Cure card: The viruses are not weak enough yet. No one is cured this round.";
            } else if (players.length > 0) {
                const randomPlayer = players[Math.floor(Math.random() * players.length)];
                const template = cureTemplates[currentMode] || "Cure card: {p1} is cured from their virus.";
                text = template.replace(/{p1}/g, randomPlayer || '');
                targetPlayer = randomPlayer;
            } else {
                text = "Cure card.";
            }

            return { text, p1: targetPlayer, p2: null };
        }

        /* Game control */
        function startGame(mode) {
            currentMode = mode;
            currentDeck = db[mode].map(card => ({ ...card }));
            activeViruses = [];
            roundsPlayed = 0;
            totalRounds = calculateTotalRounds();

            updateVirusStatusUI();
            updateRoundInfo();
            goToScreen('screen-game');
            nextCard();
        }

        function restartSameVibe() {
            startGame(currentMode);
        }

        function endCurrentGameToModes() {
            currentDeck = [];
            activeViruses = [];
            roundsPlayed = 0;
            totalRounds = 0;
            updateVirusStatusUI();
            updateRoundInfo();
            goToScreen('screen-modes');
        }

        /* Main draw */
        function nextCard() {
            if (roundsPlayed >= totalRounds) {
                endGame();
                return;
            }

            updateRoundInfo();

            const cardEl = document.getElementById('card');
            cardEl.classList.remove('pulse');
            void cardEl.offsetWidth;
            cardEl.classList.add('pulse');

            const cardData = drawNextCardData();
            if (!cardData) {
                endGame();
                return;
            }

            let nameInfo;
            if (cardData.type === 'virus') {
                nameInfo = injectNamesForVirus(cardData);
            } else if (cardData.type === 'cure') {
                nameInfo = injectNamesForCure();
            } else {
                nameInfo = injectNames(cardData.text);
            }

            const processedText = nameInfo.text;

            document.getElementById('card-cat').innerText = cardData.type.toUpperCase();
            document.getElementById('card-txt').innerText = processedText;
            cardEl.style.backgroundColor = colors[cardData.type] || colors.standard;

            if (cardData.type === 'virus') {
                applyVirus(cardData, nameInfo);
            } else if (cardData.type === 'cure') {
                applyCure();
            }

            updateVirusStatusUI();
            roundsPlayed += 1;
        }

        function endGame() {
            const summary = document.getElementById('end-summary');
            if (summary) {
                const label = modeLabels[currentMode] || currentMode;
                summary.innerText = "You played " + roundsPlayed + " rounds of " + label + " mode.";
            }

            const extendBtn = document.getElementById('extend-btn');
            if (extendBtn) {
                extendBtn.disabled = currentDeck.length === 0;
            }

            goToScreen('screen-end');
        }

        function extendRounds() {
            if (currentDeck.length === 0) {
                const extendBtn = document.getElementById('extend-btn');
                if (extendBtn) extendBtn.disabled = true;
                return;
            }

            totalRounds = roundsPlayed + currentDeck.length;

            const extendBtn = document.getElementById('extend-btn');
            if (extendBtn) {
                extendBtn.disabled = currentDeck.length === 0;
            }

            updateRoundInfo();
            goToScreen('screen-game');
        }

        /* Virus and cure application */
        function applyVirus(cardData, nameInfo) {
            const infectedSet = new Set(activeViruses.map(v => v.player));
            const infectionRound = getCurrentRoundNumber();

            if (nameInfo.p1 && !infectedSet.has(nameInfo.p1) && activeViruses.length < MAX_GLOBAL_VIRUSES) {
                activeViruses.push({ player: nameInfo.p1, source: cardData.text, infectedRound: infectionRound });
                infectedSet.add(nameInfo.p1);
            }

            if (cardData.infectsBoth && nameInfo.p2 && !infectedSet.has(nameInfo.p2) && activeViruses.length < MAX_GLOBAL_VIRUSES) {
                activeViruses.push({ player: nameInfo.p2, source: cardData.text, infectedRound: infectionRound });
                infectedSet.add(nameInfo.p2);
            }
        }

        function applyCure() {
            const eligibleVirus = getOldestCureEligibleVirus();
            if (!eligibleVirus) return;
            // Oldest eligible virus is always at index 0 in FIFO queue
            activeViruses.shift();
        }

        /* Virus status UI */
        function updateVirusStatusUI() {
            const container = document.getElementById('virus-status');
            if (!container) return;

            if (activeViruses.length === 0) {
                container.style.display = 'none';
                container.innerText = '';
                return;
            }

            container.style.display = 'block';
            const summary = activeViruses.map(v => v.player).join(' ');
            container.innerText = "Active viruses: " + summary;
        }
    </script>
</body>
</html>
